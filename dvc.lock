    params:
      params.yaml:
        model:
          algorithm: lightgbm
          objective: multiclass
          num_class: 3
          metric: multi_logloss
          num_leaves: 15
          max_depth: 6
          min_child_samples: 50
          n_estimators: 1000
          learning_rate: 0.03
          reg_alpha: 0.1
