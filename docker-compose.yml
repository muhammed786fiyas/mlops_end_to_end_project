# Docker Compose orchestration for the football-mlops project.
#
# Services:
#   - mlflow            : MLflow tracking server + Model Registry (port 5000)
#   - backend           : FastAPI prediction service (port 8000)
#   - frontend          : Nginx serving static UI (port 8080)
#   - postgres          : Airflow metadata DB (internal only)
#   - airflow-init      : One-shot DB initialization
#   - airflow-scheduler : Airflow scheduler (runs DAGs)
#   - airflow-webserver : Airflow UI (port 8081)
#
# Start:  docker compose up -d
# Stop:   docker compose down

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  image: football-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'false'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:admin'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: '/opt/airflow/config/simple_auth_manager_passwords.json.generated'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    AIRFLOW__API__BASE_URL: 'http://airflow-webserver:8080/'
    AIRFLOW__API_AUTH__JWT_SECRET: 'change-me-in-production-please'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./:/opt/airflow/project
    - ./mlflow_artifacts:/mlflow/mlflow_artifacts
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - football-net

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: football-mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/mlflow_artifacts
      - --serve-artifacts  
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - "*"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlflow_artifacts:/mlflow/mlflow_artifacts
    networks:
      - football-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: football-backend:latest
    container_name: football-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./logs:/app/logs
      - ./data/processed:/app/data/processed
      - ./models:/app/models
      - ./mlflow_artifacts:/mlflow/mlflow_artifacts
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - football-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: football-frontend:latest
    container_name: football-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - football-net
  
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: football-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    networks:
      - football-net
    depends_on:
      - backend
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:11.3.1
    container_name: football-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_LOG_LEVEL=warn
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    networks:
      - football-net
    depends_on:
      - prometheus
    restart: unless-stopped
  
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: football-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
      - alertmanager-data:/alertmanager
    networks:
      - football-net
    depends_on:
      - webhook-logger
      - mailtrap-relay
    restart: unless-stopped

  webhook-logger:
    build:
      context: ./webhook_logger
      dockerfile: Dockerfile
    image: football-webhook-logger:latest
    container_name: football-webhook-logger
    networks:
      - football-net
    restart: unless-stopped

  mailtrap-relay:
    build:
      context: .
      dockerfile: monitoring/alertmanager/Dockerfile.relay
    image: football-mailtrap-relay:latest
    container_name: football-mailtrap-relay
    environment:
      - MAILTRAP_API_TOKEN=${MAILTRAP_API_TOKEN}
      - MAILTRAP_INBOX_ID=${MAILTRAP_INBOX_ID}
      - MAILTRAP_TO_EMAIL=${MAILTRAP_TO_EMAIL}
      - MAILTRAP_FROM_EMAIL=${MAILTRAP_FROM_EMAIL:-alerts@football-mlops.example.com}
      - MAILTRAP_FROM_NAME=${MAILTRAP_FROM_NAME:-Football MLOps AlertManager}
    networks:
      - football-net
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: football-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - football-net

  airflow-init:
    <<: *airflow-common
    container_name: football-airflow-init
    command:
      - bash
      - -c
      - |
        set -e
        echo "Running airflow db migrate..."
        airflow db migrate
        echo "Init complete."
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: football-airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: football-airflow-webserver
    command: api-server
    ports:
      - "8081:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  football-net:
    driver: bridge

volumes:
  postgres-db-volume:
  prometheus-data:
  grafana-data:
  alertmanager-data: