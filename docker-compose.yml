# Docker Compose orchestration for the football-mlops project.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
# Rebuild after code changes: docker compose up -d --build

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: football-mlflow
    command:
      - mlflow
      - server
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/mlflow_artifacts
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --allowed-hosts
      - "*"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlflow_artifacts:/mlflow/mlflow_artifacts
    networks:
      - football-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: football-backend:latest
    container_name: football-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./logs:/app/logs
      - ./data/processed:/app/data/processed
      - ./models:/app/models
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - football-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: football-frontend:latest
    container_name: football-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - football-net

networks:
  football-net:
    driver: bridge