# Feature engineering parameters
features:
  rolling_window_size: 5      # Number of previous matches to consider for form
  h2h_window_size: 5          # Number of previous H2H meetings to consider

# Train/test split parameters
split:
  train_seasons: ["2008/2009", "2009/2010", "2010/2011", "2011/2012", "2012/2013", "2013/2014"]
  test_seasons: ["2014/2015"]
  production_seasons: ["2015/2016"]